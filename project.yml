name: Sprawl
options:
  bundleIdPrefix: com.ramijames
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Manual
    # Stable self-signed identity (created in Keychain Access) so the app's code identity
    # doesn't change every rebuild — macOS TCC then remembers granted permissions across builds
    # instead of re-prompting. Falls back to ad-hoc ("-") on machines without this cert.
    CODE_SIGN_IDENTITY: "Sprawl Dev"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    # v1.12.0+ adds a Metal renderer that needs Xcode's separately-downloadable Metal
    # Toolchain; 1.11.2 is the newest tag that builds without it.
    exactVersion: 1.11.2
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    exactVersion: 0.15.2
targets:
  Sprawl:
    type: application
    platform: macOS
    sources:
      - Sprawl
    settings:
      base:
        # Allow the post-build copy script to write outside DerivedData (into ./build).
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: SwiftTerm
      - package: CodeEditSourceEditor
    postBuildScripts:
      # Mirror the freshly built app to a predictable, gitignored ./build/Sprawl.app so the
      # binary is always at the same path (instead of the hashed DerivedData location).
      # Runs after every build in both Xcode and `xcodebuild`.
      - name: Copy app to ./build
        basedOnDependencyAnalysis: false
        script: |
          set -e
          DEST="$PROJECT_DIR/build/$WRAPPER_NAME"
          rm -rf "$DEST"
          mkdir -p "$PROJECT_DIR/build"
          cp -R "$TARGET_BUILD_DIR/$WRAPPER_NAME" "$DEST"
          # cp invalidates the nested signatures, so re-sign the copy. `--deep` over the whole
          # bundle is unreliable with the debug-dylib layout (Sprawl.debug.dylib / __preview.dylib)
          # and can leave the app *unsigned* — launchd then refuses it. Instead sign each nested
          # Mach-O individually (frameworks, then the MacOS binaries), then the app bundle last,
          # preferring the stable cert and falling back to ad-hoc per item so it always ends signed.
          # Best-effort per item (trailing `|| true`) so signing never *fails the build* — e.g.
          # when a previous build/Sprawl.app is still running, its binary is busy and can't be
          # overwritten. Quit the running app before building to get a fully signed copy.
          SIGN_ID="${CODE_SIGN_IDENTITY:--}"
          sign() { codesign --force --sign "$SIGN_ID" "$1" >/dev/null 2>&1 || codesign --force --sign - "$1" >/dev/null 2>&1 || true; }
          find "$DEST/Contents" -type d -name "*.framework" | while read -r fw; do sign "$fw"; done
          find "$DEST/Contents/MacOS" -type f | while read -r bin; do sign "$bin"; done
          sign "$DEST"
